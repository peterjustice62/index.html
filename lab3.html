<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 3 - CSS Basics</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    h2 {
      font-style: italic;
      text-decoration: underline;

</head>
<body>
  <h1>23/EG/CO/015</h1>

  <h2 style="color: blue;">Styled Heading</h2>

    This div demonstrates border, padding, and margin.
  </div>
</body>
