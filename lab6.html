<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 6 - DOM Manipulation</title>
  <script src="script.js" defer></script>
</head>
<body>
  <h1>23/EG/CO/015</h1>

  <h2 id="title">Original Title</h2>
  <button id="changeTitleBtn">Change Title</button>

  <p id="colorText">This paragraph will change color using JavaScript.</p>

  <h3>Dynamic List</h3>
  <ul id="itemList">
    <li>Item A</li>
    <li>Item B</li>
  </ul>
  <input type="text" id="newItem" placeholder="New list item" />
  <button id="addItemBtn">Add Item</button>

  <div class="toggle-box">Toggle my visibility</div>
  <button id="toggleBtn">Toggle Visibility</button>

  <h3>Display Input</h3>
  <input type="text" id="displayInput" placeholder="Type something" />
  <button id="displayBtn">Display</button>
  <div id="output"></div>
</body>
</html>
