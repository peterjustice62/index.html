<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 7 - Events</title>
  <script src="script.js" defer></script>
</head>
<body>
  <h1>23/EG/CO/015</h1>

  <button id="btn">Click Me</button>
  <input type="text" id="input" placeholder="Type here" />

  <div id="hoverBox" style="margin-top: 16px; padding: 12px; background: #eee;">
    Hover over me
  </div>

  <h3>Counter</h3>
  <button id="counterBtn">Increment</button>
  <span id="counter">0</span>

  <h3>Email Validation</h3>
  <form id="emailForm">
    <input type="email" id="email" placeholder="Enter email" />
    <button type="submit">Submit</button>
  </form>
  <div id="emailMessage"></div>

  <h3>Prevent Default</h3>
  <a href="https://example.com" id="testLink">Do not navigate</a>
  <div id="linkMessage"></div>

  <p id="timerText">This text will change in 5 seconds.</p>
</body>
</html>
